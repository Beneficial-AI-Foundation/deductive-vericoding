name = "deductive-vericoding"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["DeductiveVericoding"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#v4.24.0"

# [[require]]
# name = "Canonical"
# scope = "chasenorman"
# version = "git#v4.21.0"

[[require]]
name = "Loom"
git = "https://github.com/verse-lab/loom.git"
rev = "master"

[[lean_lib]]
name = "DeductiveVericoding"
